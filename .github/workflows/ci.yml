name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: |
          go build -o bin/svid-exchange ./cmd/server
          go build -o bin/svid-exchange-validate ./cmd/validate
      - name: Validate policy
        run: ./bin/svid-exchange-validate config/policy.example.yaml

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test -race -count=1 ./...

  test-integration:
    name: test-integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Integration tests
        run: go test -race -count=1 -tags integration ./...

  test-e2e:
    name: test-e2e
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start base stack (detached)
        run: docker compose up --build -d

      # svid-exchange only becomes healthy once the full SPIRE chain completes:
      # spire-server → spire-init (one-shot) → spire-agent (healthy) → svid-exchange.
      # Poll the health endpoint rather than checking container status so we know
      # the gRPC server is actually accepting connections before we run e2e tests.
      - name: Wait for svid-exchange to be ready
        run: |
          for i in $(seq 1 36); do
            if curl -sf http://localhost:8081/health/ready > /dev/null 2>&1; then
              echo "svid-exchange is ready"
              exit 0
            fi
            echo "Waiting for svid-exchange... ($i/36)"
            sleep 5
          done
          echo "Timed out waiting for svid-exchange"
          docker compose logs
          exit 1

      - name: Run e2e tests
        run: make e2e

      - name: Dump stack logs
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  publish:
    name: publish docker image
    runs-on: ubuntu-latest
    needs: [format, lint, build, test, test-integration, test-e2e]
    # Only publish on master branch pushes and semver tag pushes.
    # Skipped (not failed) on feature branches and pull requests.
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read   # checkout
      packages: write  # push to ghcr.io

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # latest — only on master branch pushes, not on tag pushes
            type=raw,value=latest,enable={{is_default_branch}}
            # sha-<7-char> — immutable, every build
            type=sha,prefix=sha-,format=short
            # v1.2.3 — only when a semver Git tag is pushed
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
